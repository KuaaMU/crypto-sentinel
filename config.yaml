exchange:
  name: okx
  sandbox: true  # OKX demo trading
  pairs:
    - BTC/USDT:USDT
    - SOL/USDT:USDT
    - ETH/USDT:USDT
    - XRP/USDT:USDT

trading:
  base_leverage: 2
  max_leverage: 5
  max_positions: 3
  max_position_pct: 0.30      # 30% of wallet per trade
  daily_loss_limit: -0.05     # -5% circuit breaker
  entry_conviction_threshold: 0.65
  exit_conviction_threshold: 0.30
  max_hold_minutes: 240       # 4 hours

scoring_weights:
  sentiment: 0.35
  whale: 0.35
  technical: 0.30

exit_strategy:
  partial_tp_levels:
    - pct: 0.33
      target: 0.03    # 33% at +3%
    - pct: 0.33
      target: 0.06    # 33% at +6%
    - pct: 0.34
      target: trailing # 34% trailing
  trailing_atr_multiplier: 1.5
  trailing_atr_period: 14

collectors:
  interval_seconds: 300       # 5 minutes
  fear_greed_url: "https://api.alternative.me/fng/"
  coingecko_base: "https://api.coingecko.com/api/v3"
  etherscan_base: "https://api.etherscan.io/api"
  min_whale_tx_usd: 1000000   # $1M+ transactions
